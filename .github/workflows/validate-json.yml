name: Validate JSON
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate every JSON file
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in Path('.').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
              print('ok', path)
          PY
