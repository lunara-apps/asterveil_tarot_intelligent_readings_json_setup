name: Build and deploy tarot content to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build JSON bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build tarot content bundles
        run: python scripts/build_bundle.py

      - name: Validate generated manifest and referenced bundles
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          docs_dir = Path("docs")
          manifest_path = docs_dir / "manifest.json"

          if not manifest_path.is_file():
              raise SystemExit("Missing docs/manifest.json")

          with manifest_path.open("r", encoding="utf-8") as f:
              manifest = json.load(f)

          required_locales = ["en", "it", "es"]
          bundles = manifest.get("bundles", {})

          for locale in required_locales:
              if locale not in bundles:
                  raise SystemExit(f"Missing locale '{locale}' in manifest.bundles")

              url = bundles[locale].get("url")
              if not url:
                  raise SystemExit(f"Missing bundle URL for locale '{locale}'")

              bundle_path = docs_dir / url

              if not bundle_path.is_file():
                  raise SystemExit(f"Manifest points to missing file: {bundle_path}")

              with bundle_path.open("r", encoding="utf-8") as f:
                  json.load(f)

              print(f"Validated {locale}: {bundle_path}")

          print("Manifest and referenced locale bundles are valid.")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4