name: Build and deploy tarot content to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build JSON bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build tarot content bundles
        run: python scripts/build_bundle.py

      - name: Validate generated manifest exists
        run: test -f docs/manifest.json

      - name: Validate generated English bundle exists
        run: test -f docs/bundles/*/tarot_content_en.json

      - name: Validate generated Italian bundle exists
        run: test -f docs/bundles/*/tarot_content_it.json

      - name: Validate generated Spanish bundle exists
        run: test -f docs/bundles/*/tarot_content_es.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4